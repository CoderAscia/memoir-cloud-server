services:
  redis:
    image: redis:latest

    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  memoir_server:
    build: .
    image: jlb027/memoir-websocket-server:${IMAGE_TAG:-latest}

    environment:
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JOURNAL_KEY_HEX=${JOURNAL_KEY_HEX}
      - MONGODB_URI=${MONGODB_URI}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
    depends_on:
      - redis
    restart: always

  nginx:
    image: nginx:latest

    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - memoir_server
    restart: always

volumes:
  redis_data:
