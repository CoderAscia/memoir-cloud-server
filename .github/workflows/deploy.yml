# This workflow will deploy source code on Cloud Run when a commit is pushed to
# the "main" branch.
#
# To configure this workflow:
#
# 1. Enable the following Google Cloud APIs:
#
#    - Artifact Registry (artifactregistry.googleapis.com)
#    - Cloud Build (cloudbuild.googleapis.com)
#    - Cloud Run (run.googleapis.com)
#    - IAM Credentials API (iamcredentials.googleapis.com)
#
#    You can learn more about enabling APIs at
#    https://support.google.com/googleapi/answer/6158841.
#
# 2. Create and configure a Workload Identity Provider for GitHub:
#    https://github.com/google-github-actions/auth#preferred-direct-workload-identity-federation.
#
#    Depending on how you authenticate, you will need to grant an IAM principal
#    permissions on Google Cloud:
#
#    - Artifact Registry Administrator (roles/artifactregistry.admin)
#    - Cloud Run Source Developer (roles/run.sourceDeveloper)
#
#    You can learn more about setting IAM permissions at
#    https://cloud.google.com/iam/docs/manage-access-other-resources.
#
# 3. Change the values in the "env" block to match your values.

name: 'Deploy to Cloud Run from Source'

on:
  push:
    branches: [ "main","staging" ]
  pull_request:
    branches: [ "main","staging"]

env:
  PROJECT_ID: '${{secrets.PROJECT_ID}}'
  REGION: 'us-central1'
  SERVICE: '${{secrets.SERVICE}}'

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: 'ubuntu-latest'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332' # actions/checkout@v4

      - name: 'Install Dependencies'
        run: 'npm install'

      - name: 'Lint'
        run: 'npm run lint'

      - name: 'Type Check'
        run: 'npm run type-check'

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@f112390a2df9932162083945e46d439060d66ec2' # google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{secrets.WIF_PROVIDER}}' # TODO: replace with your workload identity provider
          project_id: '${{secrets.PROJECT_ID}}'
          service_account: '${{secrets.SERVICE_ACCOUNT_EMAIL}}'

      - id: 'deploy'
        name: 'Deploy to Cloud Run'
        uses: 'google-github-actions/deploy-cloudrun@33553064113a37d688aa6937bacbdc481580be17' # google-github-actions/deploy-cloudrun@v2
        with:
          service: '${{ env.SERVICE }}'
          region: '${{ env.REGION }}'
          source: './'
          env_vars: |-
            NODE_ENV=production
            REDIS_CLOUD_USERNAME=default
            REDIS_CLOUD_PORT=10770
            
      - name: 'Show output'
        run: |-
          echo ${{ steps.deploy.outputs.url }}

  build-docker-image: # Build the Docker image
    if: github.ref != 'refs/heads/main' 
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build the Docker image
        run: |
          docker build . --file Dockerfile --tag jlb027/memoir-cloud-live-server:latest --tag jlb027/memoir-cloud-live-server:${{ github.sha }}

      - name: Push the Docker image
        run: |
          docker push jlb027/memoir-cloud-live-server:latest
          docker push jlb027/memoir-cloud-live-server:${{ github.sha }}
  
  deploy-self-hosted: # Deploy the Docker image to the self-hosted runner for testing
    if: github.ref == 'refs/heads/staging'
    runs-on: self-hosted
    needs: build-docker-image
    steps:  
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Containers
        shell: cmd
        env:
          IMAGE_TAG: ${{ github.sha }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          docker-compose pull
          docker-compose up -d --force-recreate
