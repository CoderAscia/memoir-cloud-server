name: 'Deploy to Cloud Run and Staging'

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]

env:
  PROJECT_ID: '${{ secrets.PROJECT_ID }}'
  REGION: 'us-central1'
  SERVICE: '${{ secrets.SERVICE }}'

jobs:
  # -------------------------------
  # MAIN BRANCH → Deploy to Cloud Run
  # -------------------------------
  deploy-to-cloud-run:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          project_id: '${{ secrets.PROJECT_ID }}'
          service_account: '${{ secrets.SERVICE_ACCOUNT_EMAIL }}'

      - id: deploy
        name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: '${{ env.SERVICE }}'
          region: '${{ env.REGION }}'
          source: './'
          env_vars: |
            NODE_ENV=production
            REDIS_CLOUD_USERNAME=default
            REDIS_CLOUD_PORT=10770

      - name: Show output
        run: echo ${{ steps.deploy.outputs.url }}

  # -------------------------------
  # STAGING BRANCH → Build live-server image only
  # -------------------------------
  build-live-server-image:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build live-server image
        run: |
          docker build . --file Dockerfile \
            --tag jlb027/memoir-cloud-live-server:latest \
            --tag jlb027/memoir-cloud-live-server:${{ github.sha }}

      - name: Push live-server image
        run: |
          docker push jlb027/memoir-cloud-live-server:latest
          docker push jlb027/memoir-cloud-live-server:${{ github.sha }}

  # -------------------------------
  # STAGING BRANCH → Deploy with Docker Compose
  # -------------------------------
  deploy-self-hosted:
    if: github.ref == 'refs/heads/staging'
    runs-on: self-hosted
    needs: build-live-server-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Containers
        shell: bash
        env:
          NODE_ENV: staging
          IMAGE_TAG: ${{ github.sha }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          REDIS_CLOUD_HOST: ${{ secrets.REDIS_CLOUD_HOST }}
          REDIS_CLOUD_PASSWORD: ${{ secrets.REDIS_CLOUD_PASSWORD }}
          REDIS_CLOUD_USERNAME: ${{ secrets.REDIS_CLOUD_USERNAME }}
          REDIS_CLOUD_PORT: ${{ secrets.REDIS_CLOUD_PORT }}
        run: |
          docker-compose pull
          docker-compose up -d --force-recreate
